services:
  # PostgreSQL with TimescaleDB
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: theman-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-theman}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-theman_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-theman}
    ports:
      - "${HOST_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U theman"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching and job queue
  redis:
    image: redis:7-alpine
    container_name: theman-redis
    ports:
      - "${HOST_REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Backend API server
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: theman-backend
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER:-theman}:${POSTGRES_PASSWORD:-theman_dev_password}@postgres:5432/${POSTGRES_DB:-theman}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      PORT: 3000
      CORS_ORIGINS: http://localhost:${HOST_WEB_PORT:-5173}
    ports:
      - "${HOST_BACKEND_PORT:-3000}:3000"
    volumes:
      - ./packages/backend:/app/packages/backend
      - ./packages/shared:/app/packages/shared
      - /app/packages/backend/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: pnpm --filter @theman/backend dev

  # BullMQ worker for polling
  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: theman-worker
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER:-theman}:${POSTGRES_PASSWORD:-theman_dev_password}@postgres:5432/${POSTGRES_DB:-theman}
      REDIS_URL: redis://redis:6379
      WORKER_MODE: polling
    volumes:
      - ./packages/backend:/app/packages/backend
      - ./packages/shared:/app/packages/shared
      - /app/packages/backend/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: pnpm --filter @theman/backend worker

  # Web frontend
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    container_name: theman-web
    environment:
      VITE_API_URL: http://localhost:${HOST_BACKEND_PORT:-3000}
    ports:
      - "${HOST_WEB_PORT:-5173}:5173"
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages/shared:/app/packages/shared
      - /app/apps/web/node_modules
    depends_on:
      - backend
    command: pnpm --filter @theman/web dev

  # Optional: Prometheus for metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: theman-prometheus
    profiles: ["monitoring"]
    ports:
      - "${HOST_PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  # Optional: Grafana for dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: theman-grafana
    profiles: ["monitoring"]
    ports:
      - "${HOST_GRAFANA_PORT:-3001}:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/dashboards:/etc/grafana/provisioning/dashboards
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  default:
    name: theman-network
