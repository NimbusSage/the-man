# docker-compose.prod.yml
# Production deployment for the-man.
# Usage: docker compose -f docker-compose.prod.yml up -d
#
# Provide a .env file at the project root with at minimum:
#   JWT_SECRET=<openssl rand -base64 48>
#   POSTGRES_PASSWORD=<strong random password>

services:
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: theman-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-theman}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-theman}
    ports:
      - "127.0.0.1:${HOST_POSTGRES_PORT:-5432}:5432"
    volumes:
      - theman_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U theman"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: theman-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:${HOST_REDIS_PORT:-6379}:6379"
    volumes:
      - theman_redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: theman-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-theman}:${POSTGRES_PASSWORD:?}@postgres:5432/${POSTGRES_DB:-theman}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      PORT: 3000
      HOST: 0.0.0.0
      CORS_ORIGINS: ${CORS_ORIGINS:-true}
    ports:
      - "127.0.0.1:${HOST_BACKEND_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: pnpm start
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-theman}:${POSTGRES_PASSWORD:?}@postgres:5432/${POSTGRES_DB:-theman}
      REDIS_URL: redis://redis:6379
      WORKER_MODE: polling
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: pnpm worker
    deploy:
      replicas: ${WORKER_REPLICAS:-2}

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    image: theman-web:latest
    container_name: theman-web
    restart: unless-stopped
    ports:
      - "${HOST_WEB_PORT:-5173}:5173"
    depends_on:
      - backend

volumes:
  theman_postgres_data:
  theman_redis_data:
